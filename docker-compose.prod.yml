services:
  postgres:
    image: postgres:16-alpine
    container_name: medusa_postgres
    restart: always
    env_file: .env.prod
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: always
    networks:
      - medusa_network

  medusa:
    image: medusa-prod
    container_name: medusa_backend
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "9000:9000"
    env_file: .env.prod
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD}@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
    networks:
      - medusa_network

volumes:
  postgres_data:

networks:
  medusa_network:
    driver: bridge
