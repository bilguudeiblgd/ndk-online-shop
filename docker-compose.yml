services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: liveselling
      POSTGRES_USER: liveselling
      POSTGRES_PASSWORD: liveselling
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://liveselling:liveselling@db:5432/liveselling?sslmode=disable

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080

volumes:
  pgdata:
